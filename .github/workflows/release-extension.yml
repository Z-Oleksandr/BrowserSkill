name: Release Extension

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if this is a version-bump commit from the workflow itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest release tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$TAG" ]; then
            TAG="v1.0.0"
            echo "No existing tags found, starting from $TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $TAG"

      - name: Determine version bump from commits
        id: bump
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"

          # Get commits since last tag (or all commits if tag doesn't exist in history)
          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"

          BUMP="none"
          if echo "$COMMITS" | grep -qiE '^major(\(.+\))?:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE '^fix(\(.+\))?:'; then
            BUMP="patch"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      - name: Calculate new version
        if: steps.bump.outputs.bump != 'none'
        id: version
        run: |
          CURRENT="${{ steps.latest_tag.outputs.tag }}"
          CURRENT="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Update manifest.json version
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$NEW_VERSION" '.version = $v' extension/manifest.json > tmp.json
          mv tmp.json extension/manifest.json
          echo "Updated manifest.json to version $NEW_VERSION"
          cat extension/manifest.json

      - name: Commit version bump
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/manifest.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --tags

      - name: Zip extension
        if: steps.bump.outputs.bump != 'none'
        run: |
          cd extension
          zip -r "../BrowserSkill-v${{ steps.version.outputs.version }}.zip" .

      - name: Create GitHub Release
        if: steps.bump.outputs.bump != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "BrowserSkill v${{ steps.version.outputs.version }}"
          body: |
            ## Installation
            1. Download `BrowserSkill-v${{ steps.version.outputs.version }}.zip`
            2. Unzip to a folder
            3. Open `chrome://extensions` (or `brave://extensions`)
            4. Enable **Developer mode**
            5. Click **Load unpacked** and select the unzipped folder
          files: "BrowserSkill-v${{ steps.version.outputs.version }}.zip"
