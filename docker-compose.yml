services:
    browserskill-server:
        build: ./server
        container_name: browserskill_server
        restart: unless-stopped
        ports:
            - "${API_SERVER_PORT:-8000}:8000"
        env_file: .env
        networks:
            - central_data_store_central_data_store_network
        depends_on: []

networks:
    central_data_store_central_data_store_network:
        external: true
