<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>BrowserSkill</h1>
    <button id="toggleView" class="icon-btn" title="Settings">
      <svg id="gearIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <svg id="listIcon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Sessions View -->
  <div id="sessionsView">
    <div class="status-bar">
      <span class="status-indicator"><img id="statusIcon" class="status-icon hidden" width="12" height="12"><span id="statusText">Not configured</span></span>
      <button id="saveNowBtn" class="btn btn-small" disabled>Save Now</button>
    </div>
    <div id="sessionList" class="session-list"></div>
    <div class="new-session">
      <input type="text" id="newSessionName" placeholder="New session name..." maxlength="100">
      <button id="createSessionBtn" class="btn btn-accent">Create</button>
    </div>
  </div>

  <!-- Settings View -->
  <div id="settingsView" class="hidden">
    <div class="form-group">
      <label for="serverUrl">Server URL</label>
      <input type="url" id="serverUrl" placeholder="http://localhost:8000">
    </div>
    <div class="form-group">
      <label for="deviceName">Device Name</label>
      <input type="text" id="deviceName" placeholder="My Brave Browser" maxlength="100">
    </div>
    <div class="form-group">
      <label for="regSecret">Registration Secret</label>
      <input type="password" id="regSecret" placeholder="Secret from server .env" maxlength="200">
    </div>
    <div class="form-group btn-row">
      <button id="registerBtn" class="btn btn-accent">Register Device</button>
      <button id="testBtn" class="btn">Test Connection</button>
    </div>
    <div id="apiKeyDisplay" class="form-group hidden">
      <label>API Key</label>
      <code id="apiKeyValue"></code>
    </div>
    <div id="settingsStatus" class="status-msg"></div>
  </div>

  <script src="../lib/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
